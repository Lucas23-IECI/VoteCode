<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VoteCode</title>
    <link rel="icon" href='data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"%3E%3Crect width="64" height="64" rx="12" fill="%23171819"/%3E%3Cpath d="M18 34l9 9 20-24" fill="none" stroke="%23b9d64b" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/%3E%3C/svg%3E' />
    <link rel="stylesheet" href="./styles.css?v=20260629-5" />
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar" aria-labelledby="page-title">
        <div>
          <p class="eyebrow">Noche de juegos</p>
          <h1 id="page-title">VoteCode</h1>
          <p class="subtitle">Que gane el plan que mas prende al grupo.</p>
        </div>
        <div class="hero-visual">
          <div class="mini-screen">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div class="controller">
            <span class="dpad"></span>
            <span class="button button-a"></span>
            <span class="button button-b"></span>
          </div>
          <div class="summary-pill">
            <span id="total-votes">0</span>
            <small id="total-votes-label">papeletas</small>
          </div>
        </div>
      </section>

      <section class="vote-panel" aria-label="Panel de votacion">
        <div id="auth-panel" class="auth-panel"></div>
        <div class="vote-row">
          <div>
            <h2>Tu papeleta</h2>
            <p id="status-message" class="status-message" aria-live="polite">Cargando...</p>
          </div>
          <div class="vote-actions">
            <span id="selection-counter" class="selection-counter">0/10</span>
            <button id="clear-selection" class="ghost-button" type="button">Limpiar</button>
            <button id="save-votes" class="vote-button" type="button">Guardar voto</button>
          </div>
        </div>
      </section>

      <section class="podium-section" aria-labelledby="podium-title">
        <h2 id="podium-title">Podio</h2>
        <div id="podium" class="podium" aria-live="polite"></div>
      </section>

      <section class="content-grid">
        <section aria-labelledby="games-title">
          <h2 id="games-title">Juegos</h2>
          <div id="games-list" class="games-list"></div>
        </section>

        <aside class="ranking-panel" aria-labelledby="ranking-title">
          <h2 id="ranking-title">Ranking</h2>
          <div id="ranking-list" class="ranking-list"></div>

          <div class="history-block">
            <h3>Ultimas papeletas</h3>
            <ol id="vote-history" class="vote-history"></ol>
          </div>
        </aside>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="./config.js?v=20260629-5"></script>
    <script src="./app.js?v=20260629-5"></script>
  </body>
</html>
